<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم توليد روابط HTML</title>
    <style>
        :root {
            --bg-color: #1e1e2f;
            --card-bg: #27293d;
            --primary: #e14eca;
            --secondary: #00f2c3;
            --text-main: #ffffff;
            --text-muted: #9a9a9a;
            --danger: #ff4d4d; /* لون زر المسح */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 900px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-top: 4px solid var(--secondary);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 24px;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        /* تنسيق شريط الأدوات الجديد فوق المربع */
        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        label {
            font-weight: bold;
            color: var(--secondary);
            font-size: 15px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            background-color: #3b3d5c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-small:hover {
            background-color: #4a4d73;
        }

        .btn-small.danger {
            background-color: var(--danger);
        }

        .btn-small.danger:hover {
            background-color: #e60000;
        }

        textarea {
            width: 100%;
            height: 200px;
            background-color: #1d1e2b;
            border: 1px solid #3b3d5c;
            color: var(--text-main);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            direction: ltr;
            outline: none;
            transition: all 0.3s ease;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(225, 78, 202, 0.2);
        }

        .btn-generate {
            background: linear-gradient(45deg, var(--primary), #ba22a3);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(225, 78, 202, 0.4);
        }

        .result-area {
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .link-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .link-input {
            flex: 1;
            background-color: #1d1e2b;
            border: 1px solid #3b3d5c;
            color: var(--secondary);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            direction: ltr;
            outline: none;
        }

        .btn-action {
            background-color: #3b3d5c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-action.copy {
            background-color: var(--secondary);
            color: #000;
        }

        .btn-action:hover {
            opacity: 0.8;
        }

        .preview-section {
            margin-top: 20px;
            border: 1px solid #3b3d5c;
            border-radius: 8px;
            overflow: hidden;
            background-color: #fff;
        }

        .preview-header {
            background-color: #3b3d5c;
            padding: 10px;
            font-size: 14px;
            text-align: center;
            color: white;
        }

        iframe {
            width: 100%;
            height: 300px;
            border: none;
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--secondary);
            color: #000;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>أداة تحويل كود HTML إلى رابط</h1>
            <p>ضع كود الصفحة كاملاً بالأسفل، وسيتم توليد رابط مباشر لها ومعاينتها فوراً</p>
        </div>

        <div class="input-group">
            <div class="input-header">
                <label for="htmlCode">كود HTML:</label>
                <div class="action-buttons">
                    <button class="btn-small" onclick="pasteCode()">لصق</button>
                    <button class="btn-small danger" onclick="clearCode()">مسح الكل</button>
                </div>
            </div>
            <textarea id="htmlCode" placeholder="<!DOCTYPE html>&#10;<html>&#10;...&#10;</html>"></textarea>
        </div>

        <button class="btn-generate" onclick="generatePageLink()">تحويل وتوليد الرابط الآن</button>

        <div class="result-area" id="resultArea">
            <label>الرابط الخاص بالصفحة (رابط كامل مستقل):</label>
            <div class="link-box">
                <input type="text" id="generatedLink" class="link-input" readonly>
                <button class="btn-action copy" onclick="copyLink()">نسخ الرابط</button>
                <button class="btn-action" onclick="openInNewTab()">فتح في نافذة</button>
            </div>

            <div class="preview-section">
                <div class="preview-header">معاينة حية للصفحة المنسوخة</div>
                <iframe id="previewFrame"></iframe>
            </div>
        </div>
    </div>

    <div class="toast" id="toastMsg">تم الإجراء بنجاح!</div>

    <script>
        let currentBlobUrl = null;

        // دالة لصق الكود
        async function pasteCode() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('htmlCode').value = text;
            } catch (err) {
                alert('عذراً، متصفحك يمنع اللصق التلقائي. يرجى الضغط بيمين الماوس واختيار لصق، أو استخدام Ctrl+V');
            }
        }

        // دالة مسح الكل
        function clearCode() {
            document.getElementById('htmlCode').value = '';
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('generatedLink').value = '';
            document.getElementById('previewFrame').src = '';
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = null;
            }
        }

        function generatePageLink() {
            const htmlContent = document.getElementById('htmlCode').value;
            
            if (htmlContent.trim() === '') {
                alert('عذراً، يجب عليك لصق كود HTML أولاً!');
                return;
            }

            const encodedHtml = encodeURIComponent(htmlContent);
            const dataUri = `data:text/html;charset=utf-8,${encodedHtml}`;
            document.getElementById('generatedLink').value = dataUri;

            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl); 
            }
            const blob = new Blob([htmlContent], { type: 'text/html' });
            currentBlobUrl = URL.createObjectURL(blob);

            document.getElementById('previewFrame').src = currentBlobUrl;
            document.getElementById('resultArea').style.display = 'block';
        }

        function copyLink() {
            const linkInput = document.getElementById('generatedLink');
            linkInput.select();
            linkInput.setSelectionRange(0, 999999); 
            
            navigator.clipboard.writeText(linkInput.value).then(() => {
                showToast('تم نسخ الرابط بنجاح!');
            }).catch(err => {
                document.execCommand('copy');
                showToast('تم نسخ الرابط بنجاح!');
            });
        }

        function openInNewTab() {
            if (currentBlobUrl) {
                window.open(currentBlobUrl, '_blank');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = message || 'تم الإجراء بنجاح!';
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
